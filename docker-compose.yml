services:

  # ============================================
  # Eureka Server (Service Registry — port 8761)
  # ============================================
  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile.eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8761/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ============================================
  # API Gateway (Single Entry Point — port 8080)
  # ============================================
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Benefits Service (port 8082)
  # ============================================
  benefits-service:
    build:
      context: .
      dockerfile: Dockerfile.benefits
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexbenefits
      SPRING_DATASOURCE_USERNAME: flexuser
      SPRING_DATASOURCE_PASSWORD: flexpass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: claim-documents
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBmbGV4YmVuZWZpdHMgand0IHNpZ25pbmc=
      JWT_EXPIRATION: 86400000
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_FLYWAY_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Claims Service (port 8081)
  # ============================================
  claims-service:
    build:
      context: .
      dockerfile: Dockerfile.claims
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/claimsdb
      SPRING_DATASOURCE_USERNAME: flexuser
      SPRING_DATASOURCE_PASSWORD: flexpass
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBmbGV4YmVuZWZpdHMgand0IHNpZ25pbmc=
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_FLYWAY_ENABLED: "true"
      BENEFITS_SERVICE_URL: http://benefits-service:8082
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      eureka-server:
        condition: service_healthy
      benefits-service:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # PostgreSQL Database (hosts both databases)
  # ============================================
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flexuser
      POSTGRES_PASSWORD: flexpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexuser"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Redis (Idempotency + Caching)
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ============================================
  # MinIO (S3-compatible Object Storage)
  # ============================================
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  # ============================================
  # Kafka (Event Streaming — KRaft mode, no Zookeeper)
  # ============================================
  kafka:
    image: apache/kafka:3.8.0
    ports:
     - "9092:9092"
     - "9094:9094"
    environment:
     KAFKA_NODE_ID: 1
     KAFKA_PROCESS_ROLES: broker,controller
     KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
     KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
     KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
     KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
     CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
     test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
     interval: 15s
     timeout: 10s
     retries: 5
     start_period: 30s

  # ============================================
  # Prometheus (Metrics Collection — port 9090)
  # ============================================
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    depends_on:
      benefits-service:
        condition: service_started
      claims-service:
        condition: service_started
    restart: unless-stopped

  # ============================================
  # Grafana (Dashboards & Visualization — port 3000)
  # ============================================
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  prometheusdata:
  grafanadata:
