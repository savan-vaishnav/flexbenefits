version: '3.8'
services:

  # ============================================
  # FlexBenefits Application
  # ============================================
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Datasource — uses Docker service name "postgres" instead of "localhost"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flexbenefits
      SPRING_DATASOURCE_USERNAME: flexuser
      SPRING_DATASOURCE_PASSWORD: flexpass
      # Redis — uses Docker service name "redis"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # MinIO — uses Docker service name "minio"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: claim-documents
      # JWT
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBmbGV4YmVuZWZpdHMgand0IHNpZ25pbmc=
      JWT_EXPIRATION: 86400000
      # JPA
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      # Flyway
      SPRING_FLYWAY_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: flexbenefits
      POSTGRES_USER: flexuser
      POSTGRES_PASSWORD: flexpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexuser -d flexbenefits"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Redis (Idempotency + Caching)
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ============================================
  # MinIO (S3-compatible Object Storage)
  # ============================================
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

volumes:
  pgdata:
  miniodata:

