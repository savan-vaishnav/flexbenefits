spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# JWT test config
jwt.secret=dGVzdHNlY3JldGtleWZvcmZsZXhiZW5lZml0c3Rlc3Rpbmdvbmx5MTIzNDU2Nzg5MA==
jwt.expiration=86400000

# Redis ? disable for tests
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# MinIO ? mock config for tests
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=test-bucket

# Allow bean definition overriding for test mocks
spring.main.allow-bean-definition-overriding=true

# Eureka - disable for tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Kafka - disable for tests (mock KafkaTemplate provided by TestConfig)
spring.kafka.bootstrap-servers=localhost:0

