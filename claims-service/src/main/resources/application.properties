spring.application.name=claims-service
server.forward-headers-strategy=framework

# Server
server.port=8081

# Datasource (separate database for claims)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/claimsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flexuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flexpass}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,ratelimiters,retries
management.endpoint.info.enabled=true
management.info.env.enabled=true
management.health.circuitbreakers.enabled=true
management.metrics.tags.application=${spring.application.name}

# App Info
info.app.name=Claims Service
info.app.description=Claims microservice for FlexBenefits platform
info.app.version=0.1.0

# JWT (same secret as benefits-service for shared auth)
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBmbGV4YmVuZWZpdHMgand0IHNpZ25pbmc=}

# Inter-service communication
benefits-service.url=${BENEFITS_SERVICE_URL:http://localhost:8082}

# Redis (Caching)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=redis

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Kafka (Consumer)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=claims-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.claimsservice.event.EnrollmentEvent

# ============================================
# Resilience4j - Circuit Breaker
# ============================================
# benefitsService: protects the enrollment validation call
resilience4j.circuitbreaker.instances.benefitsService.register-health-indicator=true
resilience4j.circuitbreaker.instances.benefitsService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.benefitsService.sliding-window-size=10
resilience4j.circuitbreaker.instances.benefitsService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.benefitsService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.benefitsService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.benefitsService.minimum-number-of-calls=5

# ============================================
# Resilience4j - Retry
# ============================================
# benefitsService: retry transient failures with exponential backoff
resilience4j.retry.instances.benefitsService.max-attempts=3
resilience4j.retry.instances.benefitsService.wait-duration=1s
resilience4j.retry.instances.benefitsService.exponential-backoff-multiplier=2
resilience4j.retry.instances.benefitsService.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.net.ConnectException,java.io.IOException

# ============================================
# Resilience4j - Rate Limiter
# ============================================
# claimSubmission: prevents abuse of the submit endpoint
resilience4j.ratelimiter.instances.claimSubmission.limit-for-period=10
resilience4j.ratelimiter.instances.claimSubmission.limit-refresh-period=1s
resilience4j.ratelimiter.instances.claimSubmission.timeout-duration=0s

# SpringDoc / Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html