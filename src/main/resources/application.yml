spring:
  application:
    name: flexbenefits

# Datasource
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flexbenefits}
    username: ${SPRING_DATASOURCE_USERNAME:flexuser}
    password: ${SPRING_DATASOURCE_PASSWORD:flexpass}

#JPA
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}

# Flayway
  flyway:
    enable: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration

#Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
    info:
      enabled: true
  info:
    env:
      enabled: true

#App Info
info:
  app:
    name: FlexBenefits
    description: Multi-tenant benefit & claim platform
    version: 0.1.0

server:
  port: 8080

#JWT
jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBmbGV4YmVuZWZpdHMgand0IHNpZ25pbmc=}
  expiration: ${JWT_EXPIRATION:86400000} # example for 24 hours in milliseconds

# Redis
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      repositories:
        enabled: false

# MinIo
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:claim-documents}

